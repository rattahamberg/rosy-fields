name: migrate

# Applies any pending Drizzle migrations to production Neon before Vercel
# finishes deploying. Migrations are tracked in the `__migrations` table
# (see scripts/migrate.mjs) so re-runs are no-ops once everything is applied.
#
# Required GitHub secrets:
#   DATABASE_URL_UNPOOLED  - production Neon unpooled connection string
#                            (use the unpooled URL — PgBouncer blocks DDL)
#
# Optional secrets:
#   VERCEL_DEPLOY_HOOK     - if set, the workflow triggers Vercel only after
#                            migrations succeed. Disable Vercel's "Deploy on
#                            push" for production in that case so this is
#                            the only deploy path.
#
# One-time bootstrap:
#   Trigger the workflow from the Actions tab → "Run workflow" → set
#   `bootstrap` to `true`. This marks every migration in drizzle/meta/_journal.json
#   as already applied without executing it (the schema was created out-of-band
#   before CI existed). After that, leave `bootstrap` blank for normal runs.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Mark all journal entries as applied without running them (first-time setup)"
        type: boolean
        default: false

concurrency:
  group: migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          if [ "${{ inputs.bootstrap }}" = "true" ]; then
            node scripts/migrate.mjs --bootstrap
          else
            node scripts/migrate.mjs
          fi

  deploy:
    name: Trigger Vercel deploy
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on bootstrap runs — bootstrap is schema-only.
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap == false) }}
    steps:
      - name: Hit Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set — relying on Vercel's git auto-deploy."
            exit 0
          fi
          curl --fail --silent --show-error -X POST "$HOOK"
          echo "Triggered Vercel deploy."
