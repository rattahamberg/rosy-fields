name: migrate

# Applies any pending Drizzle migrations to production Neon before Vercel
# finishes deploying. Migrations are tracked in the `__migrations` table
# (see scripts/migrate.mjs) so re-runs are no-ops once everything is applied.
#
# Required GitHub secrets:
#   DATABASE_URL_UNPOOLED  - production Neon unpooled connection string
#                            (use the unpooled URL — PgBouncer blocks DDL)
#
# Optional secrets:
#   VERCEL_DEPLOY_HOOK     - if set, the workflow triggers Vercel only after
#                            migrations succeed. Disable Vercel's "Deploy on
#                            push" for production in that case so this is
#                            the only deploy path.
#
# Manual modes (workflow_dispatch only):
#   bootstrap=true  - mark every journal entry as applied without running it
#                     (first-time setup on a DB whose schema was applied
#                     out-of-band)
#   rehash=true     - rewrite stored hashes to match current file content
#                     (use after a deliberate hash-affecting edit such as
#                     adding IF NOT EXISTS guards or fixing CRLF↔LF)

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Mark all journal entries as applied without running them (first-time setup)"
        type: boolean
        default: false
      rehash:
        description: "Rewrite stored sql_hash values to match current file content (no SQL runs)"
        type: boolean
        default: false

concurrency:
  group: migrate-prod
  cancel-in-progress: false

env:
  # Opt into Node 24 for JS actions ahead of the June 2026 default flip.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          if [ "${{ inputs.bootstrap }}" = "true" ]; then
            node scripts/migrate.mjs --bootstrap
          elif [ "${{ inputs.rehash }}" = "true" ]; then
            node scripts/migrate.mjs --rehash
          else
            node scripts/migrate.mjs
          fi

  deploy:
    name: Trigger Vercel deploy
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on bootstrap/rehash runs — those are schema-only.
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap == false && inputs.rehash == false) }}
    steps:
      - name: Hit Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set — relying on Vercel's git auto-deploy."
            exit 0
          fi
          curl --fail --silent --show-error -X POST "$HOOK"
          echo "Triggered Vercel deploy."
